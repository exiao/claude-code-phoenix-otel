name: Build Binaries

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Cross-compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build all platforms
        run: make build-all

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/phoenix-logger-darwin-arm64
            bin/phoenix-logger-darwin-amd64
            bin/phoenix-logger-linux-arm64
            bin/phoenix-logger-linux-amd64
